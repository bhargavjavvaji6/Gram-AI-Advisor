<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer dark green circle -->
  <circle cx="256" cy="256" r="256" fill="#2d5016"/>
  
  <!-- Scalloped edge effect -->
  <circle cx="256" cy="256" r="240" fill="#3a6b1f"/>
  
  <!-- White inner circle -->
  <circle cx="256" cy="256" r="200" fill="white"/>
  
  <!-- Yellow sun gradient -->
  <defs>
    <radialGradient id="sunGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#fff9e6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd54f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Sun circle -->
  <circle cx="256" cy="150" r="80" fill="url(#sunGradient)"/>
  
  <!-- Sun rays -->
  <g stroke="#ffd54f" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="50" x2="256" y2="70" />
    <line x1="320" y1="86" x2="308" y2="98" />
    <line x1="336" y1="150" x2="316" y2="150" />
    <line x1="320" y1="214" x2="308" y2="202" />
    <line x1="192" y1="86" x2="204" y2="98" />
    <line x1="176" y1="150" x2="196" y2="150" />
    <line x1="192" y1="214" x2="204" y2="202" />
  </g>
  
  <!-- Green field (bottom) -->
  <ellipse cx="256" cy="380" rx="180" ry="100" fill="#7cb342"/>
  <ellipse cx="256" cy="360" rx="180" ry="90" fill="#8bc34a"/>
  <ellipse cx="256" cy="340" rx="180" ry="80" fill="#9ccc65"/>
  
  <!-- Grass/crop in center -->
  <g fill="#558b2f">
    <!-- Center grass blade -->
    <path d="M 256 280 Q 256 240 256 220 Q 258 240 260 280 Z"/>
    <path d="M 256 280 Q 256 240 256 220 Q 254 240 252 280 Z"/>
    
    <!-- Left grass blades -->
    <path d="M 240 290 Q 238 260 235 240 Q 237 260 242 290 Z"/>
    <path d="M 230 295 Q 228 270 225 255 Q 227 270 232 295 Z"/>
    
    <!-- Right grass blades -->
    <path d="M 272 290 Q 274 260 277 240 Q 275 260 270 290 Z"/>
    <path d="M 282 295 Q 284 270 287 255 Q 285 270 280 295 Z"/>
    
    <!-- Far left -->
    <path d="M 220 300 Q 218 280 215 265 Q 217 280 222 300 Z"/>
    
    <!-- Far right -->
    <path d="M 292 300 Q 294 280 297 265 Q 295 280 290 300 Z"/>
  </g>
</svg>
